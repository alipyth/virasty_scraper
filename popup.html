<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Tahoma, Arial; width: 250px; padding: 15px; }
    input, button { width: 100%; margin-top: 10px; padding: 8px; box-sizing: border-box; }
    button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px;}
    #stopBtn { background: #dc3545; display: none; }
  </style>
</head>
<body>
  <h3>ویراستی یار</h3>
  <label>تعداد اسکرول:</label>
  <input type="number" id="scrollCount" value="5" min="1">
  <button id="startBtn">شروع استخراج</button>
  <button id="stopBtn">توقف و دانلود</button>
  
  <script src="popup.js"></script>
</body>
</html>
